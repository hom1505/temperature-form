<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>冷鏈溫度巡檢表</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f0f4f8; min-height:100vh; padding-bottom:40px; }

#lang-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; background:linear-gradient(160deg,#1a5276,#2980b9); }
#lang-screen h1 { color:white; font-size:22px; text-align:center; margin-bottom:8px; }
#lang-screen p { color:rgba(255,255,255,0.8); font-size:14px; text-align:center; margin-bottom:32px; }
.lang-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:360px; }
.lang-btn { padding:18px 12px; background:white; border:none; border-radius:14px; cursor:pointer; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,0.15); }
.lang-flag { font-size:30px; display:block; margin-bottom:6px; }
.lang-name { font-size:15px; font-weight:700; color:#1a5276; display:block; }
.lang-native { font-size:12px; color:#888; display:block; margin-top:2px; }
.lang-btn.full { grid-column:1/-1; }

#main-screen { display:none; }
.header { background:linear-gradient(135deg,#1a5276,#2980b9); color:white; padding:20px 16px 16px; text-align:center; position:relative; }
.header h1 { font-size:19px; font-weight:700; }
.header p { font-size:13px; opacity:0.85; margin-top:4px; }
.lang-switch { position:absolute; top:14px; right:14px; background:rgba(255,255,255,0.2); color:white; border:1.5px solid rgba(255,255,255,0.5); border-radius:8px; padding:5px 10px; font-size:13px; cursor:pointer; }

.card { background:white; margin:16px; border-radius:14px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
.card h2 { font-size:15px; color:#1a5276; border-left:4px solid #2980b9; padding-left:10px; margin-bottom:16px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:13px; color:#555; margin-bottom:6px; font-weight:600; }
input[type=text],input[type=number],input[type=date],textarea {
  width:100%; padding:12px 14px; border:1.5px solid #dce3ea; border-radius:10px;
  font-size:16px; color:#222; background:#fafbfc; -webkit-appearance:none;
}
input:focus,textarea:focus { outline:none; border-color:#2980b9; background:white; }

.device-list { display:flex; flex-direction:column; gap:12px; }
.device-item { display:flex; align-items:flex-start; gap:12px; padding:14px; border:2px solid #dce3ea; border-radius:12px; background:#fafbfc; }
.device-item.selected { border-color:#2980b9; background:#eaf4fb; }
.device-icon { font-size:24px; padding-top:2px; }
.device-info { flex:1; }
.device-name { font-size:15px; font-weight:600; color:#222; }
.device-type { font-size:12px; color:#888; margin-top:2px; }
.photo-btn { margin-top:8px; padding:7px 14px; background:#eaf4fb; color:#2980b9; border:1.5px solid #2980b9; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
.device-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.temp-row { display:flex; align-items:center; gap:4px; }
.temp-row input { width:72px; padding:8px 10px; font-size:16px; text-align:center; border:1.5px solid #dce3ea; border-radius:8px; background:white; }
.thumb-img { width:52px; height:52px; object-fit:cover; border-radius:8px; border:2px solid #2980b9; display:none; }

.submit-btn { display:block; width:calc(100% - 32px); margin:0 16px; padding:16px; background:linear-gradient(135deg,#1a5276,#2980b9); color:white; border:none; border-radius:14px; font-size:17px; font-weight:700; cursor:pointer; }

#ai-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:999; align-items:center; justify-content:center; }
.ai-box { background:white; border-radius:18px; padding:24px 20px; margin:20px; width:100%; max-width:420px; text-align:center; }
#ai-preview { max-width:100%; max-height:200px; border-radius:10px; display:none; margin-bottom:12px; }
#ai-status { font-size:15px; color:#555; margin-bottom:14px; line-height:1.5; }
.ai-result-box { background:#eaf4fb; border-radius:10px; padding:14px; margin-bottom:14px; display:none; }
#ai-temp-display { font-size:36px; font-weight:700; color:#1a5276; margin:6px 0; }
#ai-temp-input { width:110px; padding:8px; font-size:18px; text-align:center; border:2px solid #2980b9; border-radius:8px; }
.ai-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:8px; }
.ai-btn { padding:11px 18px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; border:none; }

#result-screen { display:none; padding:16px; }
.result-card { border-radius:14px; padding:22px 18px; margin-bottom:14px; box-shadow:0 2px 12px rgba(0,0,0,0.09); }
.result-card.normal { background:#eafaf1; border:2px solid #27ae60; }
.result-card.abnormal { background:#fdedec; border:2px solid #e74c3c; }
.result-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.result-icon { font-size:30px; }
.result-title { font-size:17px; font-weight:700; }
.result-card.normal .result-title { color:#1e8449; }
.result-card.abnormal .result-title { color:#c0392b; }
.result-detail { background:white; border-radius:10px; overflow:hidden; margin-top:10px; }
.result-row { display:flex; padding:10px 14px; font-size:14px; border-bottom:1px solid #f0f0f0; align-items:center; }
.result-row:last-child { border-bottom:none; }
.result-label { color:#888; width:90px; flex-shrink:0; font-size:13px; }
.result-value { color:#222; font-weight:600; }
.result-value.bad { color:#e74c3c; font-size:16px; }
.alert-box { background:#fef9e7; border:1.5px solid #f39c12; border-radius:10px; padding:12px 14px; margin-top:10px; font-size:13px; color:#7d6608; }
.again-btn { display:block; width:100%; padding:14px; background:white; color:#2980b9; border:2px solid #2980b9; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; margin-top:14px; text-align:center; }
.spinner { display:inline-block; width:16px; height:16px; border:3px solid #ccc; border-top-color:#2980b9; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
.time-display { padding:12px 14px; background:#eaf4fb; border:1.5px solid #2980b9; border-radius:10px; font-size:16px; color:#1a5276; font-weight:600; }
</style>
</head>
<body>

<div id="lang-screen">
  <h1>🌡️ 冷鏈溫度巡檢系統</h1>
  <p>請選擇語言 / Please select language</p>
  <div class="lang-grid">
    <button class="lang-btn" onclick="setLang('zh')">
      <span class="lang-flag">🇹🇼</span>
      <span class="lang-name">中文</span>
      <span class="lang-native">繁體中文</span>
    </button>
    <button class="lang-btn" onclick="setLang('en')">
      <span class="lang-flag">🇬🇧</span>
      <span class="lang-name">English</span>
      <span class="lang-native">English</span>
    </button>
    <button class="lang-btn" onclick="setLang('vi')">
      <span class="lang-flag">🇻🇳</span>
      <span class="lang-name">Tiếng Việt</span>
      <span class="lang-native">Tiếng Việt</span>
    </button>
    <button class="lang-btn" onclick="setLang('id')">
      <span class="lang-flag">🇮🇩</span>
      <span class="lang-name">Indonesia</span>
      <span class="lang-native">Bahasa Indonesia</span>
    </button>
    <button class="lang-btn full" onclick="setLang('th')">
      <span class="lang-flag">🇹🇭</span>
      <span class="lang-name">ภาษาไทย</span>
      <span class="lang-native">Thai</span>
    </button>
  </div>
</div>

<div id="main-screen">
  <div class="header">
    <h1 id="txt-title"></h1>
    <p id="txt-subtitle"></p>
    <button class="lang-switch" onclick="goLangScreen()">🌐</button>
  </div>

  <div id="form-screen">
    <div class="card">
      <h2 id="txt-basic-info"></h2>
      <div class="field">
        <label id="txt-date-label"></label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label id="txt-time-label"></label>
        <div class="time-display" id="auto-time-display">--:--:--</div>
        <input type="hidden" id="f-timeslot">
      </div>
      <div class="field">
        <label id="txt-inspector-label"></label>
        <input type="text" id="f-inspector">
      </div>
    </div>

    <div class="card">
      <h2 id="txt-device-title"></h2>
      <p id="txt-device-hint" style="font-size:13px;color:#888;margin-bottom:14px;"></p>
      <div class="device-list" id="device-list"></div>
    </div>

    <div class="card">
      <h2 id="txt-remark-title"></h2>
      <textarea id="f-remark" rows="3"></textarea>
    </div>

    <button class="submit-btn" id="txt-submit-btn" onclick="submitForm()"></button>
  </div>

  <div id="ai-overlay">
    <div class="ai-box">
      <h3 style="margin-bottom:14px;color:#1a5276;" id="txt-ai-title"></h3>
      <img id="ai-preview">
      <div id="ai-status"></div>
      <div class="ai-result-box" id="ai-result-box">
        <div style="font-size:12px;color:#888;" id="txt-ai-result-label"></div>
        <div id="ai-temp-display"></div>
        <div style="font-size:12px;color:#888;margin-bottom:8px;" id="txt-ai-correct-hint"></div>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;">
          <input type="number" id="ai-temp-input" step="0.1">
          <span style="font-size:16px;">°C</span>
        </div>
      </div>
      <div class="ai-btns">
        <label class="ai-btn" style="background:#2980b9;color:white;">
          <span id="txt-btn-camera"></span>
          <input type="file" accept="image/*" capture="environment" id="ai-camera" style="display:none" onchange="handlePhoto(event)">
        </label>
        <label class="ai-btn" style="background:#7f8c8d;color:white;">
          <span id="txt-btn-gallery"></span>
          <input type="file" accept="image/*" id="ai-gallery" style="display:none" onchange="handlePhoto(event)">
        </label>
        <button class="ai-btn" id="ai-confirm-btn" style="background:#27ae60;color:white;display:none;" onclick="confirmTemp()"></button>
        <button class="ai-btn" style="background:#ecf0f1;color:#555;" onclick="closeOverlay()" id="txt-btn-cancel"></button>
      </div>
    </div>
  </div>
  <input type="hidden" id="ai-target">

  <div id="result-screen"></div>
</div>

    aiFail:"⚠️ ไม่สามารถอ่านได้ กรุณาถ่ายใหม่หรือกรอกด้วยตนเอง",
    normalTitle:"✅ อุณหภูมิทุกเครื่องปกติ", normalMsg:"อุปกรณ์ทั้งหมดอยู่ในเกณฑ์มาตรฐาน",
    abnormalTitle:"⚠️ พบอุณหภูมิผิดปกติ!", abnormalMsg:"อุปกรณ์ต่อไปนี้เกินมาตรฐาน กรุณาดำเนินการทันที",
    statusNormal:"✅ ปกติ", statusAbnormal:"❌ ผิดปกติ",
    labelTemp:"อุณหภูมิ", labelType:"ประเภท", labelThreshold:"เกณฑ์", labelPhoto:"รูปถ่าย",
    alertText:"🔔 การดำเนินการ: กรุณาตรวจสอบอุปกรณ์ทันทีและรายงานผู้ควบคุม",
    summaryTitle:"📋 สรุป", labelDate:"วันที่", labelTime:"เวลา", labelInspector:"ผู้ตรวจ",
    labelCount:"จำนวน", labelAbnCount:"ผิดปกติ", labelRemark:"หมายเหตุ", unitTai:"เครื่อง",
    againBtn:"🔄 บันทึกใหม่",
    fridgeRange:"ปกติ: ≤ 7°C", freezerRange:"ปกติ: ≤ -18°C",
    fridgeThreshold:"> 7°C", freezerThreshold:"> -18°C",
    alertDate:"กรุณาเลือกวันที่", alertInspector:"กรุณากรอกชื่อผู้ตรวจ",
    alertTemp:"กรุณากรอกอุณหภูมิอย่างน้อย 1 เครื่อง", alertValidTemp:"กรุณากรอกอุณหภูมิที่ถูกต้อง",
    fridge:"ตู้เย็น", freezer:"ตู้แช่แข็ง"
  }
};

var DEVICES = [
  {id:"d1", typeKey:"freezer", icon:"🧊", max:-18, num:1},
  {id:"d2", typeKey:"fridge",  icon:"❄️", max:7,   num:1},
  {id:"d3", typeKey:"fridge",  icon:"❄️", max:7,   num:2},
  {id:"d4", typeKey:"freezer", icon:"🧊", max:-18, num:2},
  {id:"d5", typeKey:"fridge",  icon:"❄️", max:7,   num:3}
];

var currentLang = "zh";
var photoData = {};
var timerInterval = null;

function t(key) { return LANGS[currentLang][key] || key; }

function setLang(lang) {
  currentLang = lang;
  document.getElementById("lang-screen").style.display = "none";
  document.getElementById("main-screen").style.display = "block";
  applyLang();
  initForm();
}

function goLangScreen() {
  document.getElementById("main-screen").style.display = "none";
  document.getElementById("lang-screen").style.display = "flex";
  if (timerInterval) clearInterval(timerInterval);
}

function applyLang() {
  document.getElementById("txt-title").textContent = t("title");
  document.getElementById("txt-subtitle").textContent = t("subtitle");
  document.getElementById("txt-basic-info").textContent = t("basicInfo");
  document.getElementById("txt-date-label").textContent = t("dateLabel");
  document.getElementById("txt-time-label").textContent = t("timeLabel");
  document.getElementById("txt-inspector-label").textContent = t("inspectorLabel");
  document.getElementById("f-inspector").placeholder = t("inspectorPlaceholder");
  document.getElementById("txt-device-title").textContent = t("deviceTitle");
  document.getElementById("txt-device-hint").textContent = t("deviceHint");
  document.getElementById("txt-remark-title").textContent = t("remarkTitle");
  document.getElementById("f-remark").placeholder = t("remarkPlaceholder");
  document.getElementById("txt-submit-btn").textContent = t("submitBtn");
  document.getElementById("txt-ai-title").textContent = t("aiTitle");
  document.getElementById("ai-status").textContent = t("aiStatus");
  document.getElementById("txt-ai-result-label").textContent = t("aiResultLabel");
  document.getElementById("txt-ai-correct-hint").textContent = t("aiCorrectHint");
  document.getElementById("txt-btn-camera").textContent = t("btnCamera");
  document.getElementById("txt-btn-gallery").textContent = t("btnGallery");
  document.getElementById("ai-confirm-btn").textContent = t("btnConfirm");
  document.getElementById("txt-btn-cancel").textContent = t("btnCancel");
}

function updateAutoTime() {
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,"0");
  var mm = String(now.getMinutes()).padStart(2,"0");
  var ss = String(now.getSeconds()).padStart(2,"0");
  var timeStr = hh + ":" + mm + ":" + ss;
  document.getElementById("f-timeslot").value = timeStr;
  document.getElementById("auto-time-display").textContent = "🕐 " + timeStr;
}

function initForm() {
  var today = new Date();
  var yyyy = today.getFullYear();
  var mm = String(today.getMonth()+1).padStart(2,"0");
  var dd = String(today.getDate()).padStart(2,"0");
  document.getElementById("f-date").value = yyyy+"-"+mm+"-"+dd;

  updateAutoTime();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateAutoTime, 1000);

  var list = document.getElementById("device-list");
  list.innerHTML = "";
  DEVICES.forEach(function(d) {
    var typeLabel = t(d.typeKey);
    var rangeLabel = d.typeKey === "fridge" ? t("fridgeRange") : t("freezerRange");
    var nameLabel = typeLabel + " " + d.num;
    list.innerHTML += '<div class="device-item" id="item-'+d.id+'">' +
      '<div class="device-icon">'+d.icon+'</div>' +
      '<div class="device-info">' +
        '<div class="device-name">'+nameLabel+'</div>' +
        '<div class="device-type">'+typeLabel+'｜'+rangeLabel+'</div>' +
        '<button class="photo-btn" onclick="openOverlay(\''+d.id+'\')">'+t("photoBtn")+'</button>' +
      '</div>' +
      '<div class="device-right">' +
        '<div class="temp-row">' +
          '<input type="number" id="temp-'+d.id+'" placeholder="--" step="0.1" oninput="activateDevice(\''+d.id+'\')">' +
          '<span>°C</span>' +
        '</div>' +
        '<img class="thumb-img" id="thumb-'+d.id+'">' +
      '</div>' +
    '</div>';
  });
}

function activateDevice(id) {
  document.getElementById("item-"+id).classList.add("selected");
}

function openOverlay(deviceId) {
  document.getElementById("ai-target").value = deviceId;
  document.getElementById("ai-preview").style.display = "none";
  document.getElementById("ai-result-box").style.display = "none";
  document.getElementById("ai-confirm-btn").style.display = "none";
  document.getElementById("ai-status").textContent = t("aiStatus");
  document.getElementById("ai-overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("ai-overlay").style.display = "none";
}

function handlePhoto(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var base64 = ev.target.result;
    var preview = document.getElementById("ai-preview");
    preview.src = base64;
    preview.style.display = "block";
    document.getElementById("ai-status").innerHTML = '<span class="spinner"></span>' + t("aiRecognizing");
    document.getElementById("ai-result-box").style.display = "none";
    document.getElementById("ai-confirm-btn").style.display = "none";

    var pureBase64 = base64.split(",")[1];
    var mediaType = file.type || "image/jpeg";

    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 200,
        messages: [{
          role: "user",
          content: [
            {type:"image", source:{type:"base64", media_type:mediaType, data:pureBase64}},
            {type:"text", text:"This image shows a thermometer. Reply ONLY with the numeric temperature value (e.g. -18.5 or 5.2). No units, no text. If unreadable, reply: unreadable"}
          ]
        }]
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var raw = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text.trim() : "unreadable";
      if (raw === "unreadable" || isNaN(parseFloat(raw))) {
        document.getElementById("ai-status").textContent = t("aiFail");
      } else {
        var temp = parseFloat(raw);
        document.getElementById("ai-temp-display").textContent = temp + "°C";
        document.getElementById("ai-temp-input").value = temp;
        document.getElementById("ai-result-box").style.display = "block";
        document.getElementById("ai-confirm-btn").style.display = "inline-block";
        document.getElementById("ai-status").textContent = t("aiDone");
        photoData[document.getElementById("ai-target").value] = base64;
      }
    })
    .catch(function() {
      document.getElementById("ai-status").textContent = t("aiFail");
    });
  };
  reader.readAsDataURL(file);
  e.target.value = "";
}

function confirmTemp() {
  var devId = document.getElementById("ai-target").value;
  var temp = parseFloat(document.getElementById("ai-temp-input").value);
  if (isNaN(temp)) { alert(t("alertValidTemp")); return; }
  document.getElementById("temp-"+devId).value = temp;
  activateDevice(devId);
  if (photoData[devId]) {
    var thumb = document.getElementById("thumb-"+devId);
    thumb.src = photoData[devId];
    thumb.style.display = "block";
  }
  closeOverlay();
}

function submitForm() {
  var date = document.getElementById("f-date").value;
  var timeslot = document.getElementById("f-timeslot").value;
  var inspector = document.getElementById("f-inspector").value.trim();
  var remark = document.getElementById("f-remark").value.trim();
  if (!date) { alert(t("alertDate")); return; }
  if (!inspector) { alert(t("alertInspector")); return; }

  var records = [];
  DEVICES.forEach(function(d, i) {
    var val = document.getElementById("temp-"+d.id).value;
    if (val !== "") {
      var temp = parseFloat(val);
      var num = i < 2 ? (i+1) : (i-1);
      records.push({
        id: d.id,
        name: t(d.typeKey) + " " + d.num,
        typeKey: d.typeKey,
        icon: d.icon,
        temp: temp,
        max: d.max,
        abnormal: d.typeKey === "fridge" ? temp > 7 : temp > -18,
        thresholdLabel: d.typeKey === "fridge" ? t("fridgeThreshold") : t("freezerThreshold"),
        typeLabel: t(d.typeKey)
      });
    }
  });

  if (records.length === 0) { alert(t("alertTemp")); return; }

  submitToSheets(date, timeslot, inspector, remark, records);
  showResult(date, timeslot, inspector, remark, records);
}

function submitToSheets(date, timeslot, inspector, remark, records) {
  try {
    var payload = {
      date: date,
      timeslot: timeslot,
      inspector: inspector,
      remark: remark,
      records: records.map(function(r) {
        return {name: r.name, type: r.typeKey, temp: r.temp};
      })
    };
    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
  } catch(err) {
    console.error("送出失敗：", err);
  }
}

function showResult(date, timeslot, inspector, remark, records) {
  var hasAbnormal = records.some(function(r) { return r.abnormal; });
  var now = new Date().toLocaleTimeString("zh-TW", {hour:"2-digit", minute:"2-digit"});
  var html = "";

  if (hasAbnormal) {
    html += '<div class="result-card abnormal"><div class="result-header"><span class="result-icon">⚠️</span><span class="result-title">'+t("abnormalTitle")+'</span></div><p style="font-size:14px;color:#922b21;">'+t("abnormalMsg")+'</p></div>';
  } else {
    html += '<div class="result-card normal"><div class="result-header"><span class="result-icon">✅</span><span class="result-title">'+t("normalTitle")+'</span></div><p style="font-size:14px;color:#1e8449;">'+t("normalMsg")+'</p></div>';
  }

  records.forEach(function(r) {
    var thumbHtml = photoData[r.id] ? '<div class="result-row"><span class="result-label">'+t("labelPhoto")+'</span><span class="result-value"><img src="'+photoData[r.id]+'" style="height:56px;border-radius:6px;border:2px solid #ddd;"></span></div>' : "";
    html += '<div class="result-card '+(r.abnormal?"abnormal":"normal")+'">' +
      '<div class="result-header"><span class="result-icon">'+r.icon+'</span><span class="result-title">'+r.name+'　'+(r.abnormal?t("statusAbnormal"):t("statusNormal"))+'</span></div>' +
      '<div class="result-detail">' +
        '<div class="result-row"><span class="result-label">'+t("labelTemp")+'</span><span class="result-value'+(r.abnormal?" bad":"")+'">'+r.temp+'°C</span></div>' +
        '<div class="result-row"><span class="result-label">'+t("labelType")+'</span><span class="result-value">'+r.typeLabel+'</span></div>' +
        '<div class="result-row"><span class="result-label">'+t("labelThreshold")+'</span><span class="result-value">'+r.thresholdLabel+'</span></div>' +
        thumbHtml +
      '</div>' +
      (r.abnormal?'<div class="alert-box">'+t("alertText")+'</div>':"") +
    '</div>';
  });

  var unit = t("unitTai");
  html += '<div class="card" style="margin:0 0 14px;">' +
    '<h2>'+t("summaryTitle")+'</h2>' +
    '<div class="result-detail">' +
      '<div class="result-row"><span class="result-label">'+t("labelDate")+'</span><span class="result-value">'+date+'</span></div>' +
      '<div class="result-row"><span class="result-label">'+t("labelTime")+'</span><span class="result-value">'+timeslot+'</span></div>' +
      '<div class="result-row"><span class="result-label">'+t("labelInspector")+'</span><span class="result-value">'+inspector+'</span></div>' +
      '<div class="result-row"><span class="result-label">'+t("labelCount")+'</span><span class="result-value">'+records.length+' '+unit+'</span></div>' +
      '<div class="result-row"><span class="result-label">'+t("labelAbnCount")+'</span><span class="result-value'+(hasAbnormal?" bad":"")+'">'+records.filter(function(r){return r.abnormal;}).length+' '+unit+'</span></div>' +
      (remark?'<div class="result-row"><span class="result-label">'+t("labelRemark")+'</span><span class="result-value">'+remark+'</span></div>':"") +
    '</div></div>' +
    '<button class="again-btn" onclick="resetForm()">'+t("againBtn")+'</button>' +
    '<p style="text-align:center;font-size:12px;color:#aaa;margin-top:8px;">'+date+' '+now+'</p>';

  document.getElementById("form-screen").style.display = "none";
  var rs = document.getElementById("result-screen");
  rs.style.display = "block";
  rs.innerHTML = html;
  window.scrollTo(0,0);
}

function resetForm() {
  DEVICES.forEach(function(d) {
    document.getElementById("temp-"+d.id).value = "";
    document.getElementById("item-"+d.id).classList.remove("selected");
    var thumb = document.getElementById("thumb-"+d.id);
    if (thumb) thumb.style.display = "none";
    delete photoData[d.id];
  });
  document.getElementById("f-remark").value = "";
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("form-screen").style.display = "block";
  window.scrollTo(0,0);
}
</script>
